server:
  port: 8000

spring:
  application:
    name: gateway
  cloud:
    gateway:
      default-filters:
        - name: GlobalFilter
          args:
            baseMessage: Spring Cloud Gateway Global Filter
            preLogger: true
            postLogger: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
          - Path=/api/users/**
          filters:
          - StripPrefix=1
          - name: CustomFilter
          - name: LoggingFilter
            args:
              baseMessage: Hi, there
              preLogger: true
              postLogger: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
